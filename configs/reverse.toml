[task]
name = "reverse"
digit_count = 10
min_len = 3
max_len = 12
dataset_size = 50000
train_ratio = 0.9
val_ratio = 0.05
test_ratio = 0.05
seed = 42
source_eos = true
samples_to_export = 32
data_dir = "data/generated"

[model]
d_model = 64
num_heads = 4
num_encoder_layers = 2
num_decoder_layers = 2
d_ff = 128
dropout = 0.1
max_positions = 64

[train]
batch_size = 64
max_steps = 1000
eval_every = 100
log_every = 20
learning_rate = 0.0005
weight_decay = 0.0
grad_clip = 1.0
device = "auto"
run_dir = "runs"
